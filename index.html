<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ad Studio | Modern SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        /* Custom scrollbar for output area */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-4 md:p-8 flex justify-center items-center">

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-6 h-[85vh]">
        
        <!-- Left Panel: Input Controls -->
        <div class="lg:col-span-4 glass-panel rounded-3xl p-6 shadow-xl shadow-indigo-100/50 flex flex-col h-full overflow-y-auto">
            <div class="mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-100 text-indigo-600 mb-3">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">AI Ad Studio</h1>
                <p class="text-sm text-slate-500 mt-1">Generate high-converting ad copies instantly.</p>
            </div>

            <div class="space-y-4 flex-1">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Product/Service Name</label>
                    <input type="text" id="product" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white" placeholder="e.g. Noise Cancelling Headphones">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Marketing Tone</label>
                    <div class="relative">
                        <select id="tone" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white appearance-none">
                            <option value="Professional & Trustworthy">👔 Professional & Trustworthy</option>
                            <option value="Catchy & Exciting">🔥 Catchy & Exciting</option>
                            <option value="Urgent & FOMO">⏳ Urgent & FOMO</option>
                            <option value="Humorous">😄 Humorous</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Language</label>
                    <div class="flex gap-2">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="lang" value="English" checked class="peer sr-only">
                            <div class="text-center px-3 py-2 border border-slate-200 rounded-lg peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 text-sm font-medium transition-colors bg-white">EN</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="lang" value="Bengali" class="peer sr-only">
                            <div class="text-center px-3 py-2 border border-slate-200 rounded-lg peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 text-sm font-medium transition-colors bg-white">BN</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="lang" value="Hindi" class="peer sr-only">
                            <div class="text-center px-3 py-2 border border-slate-200 rounded-lg peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-700 text-sm font-medium transition-colors bg-white">HI</div>
                        </label>
                    </div>
                </div>

            </div>
            
            <button id="generate-btn" class="w-full mt-6 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-200 hover:shadow-indigo-300 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 shrink-0">
                <span>Generate Copies</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <!-- Right Panel: Results -->
        <div class="lg:col-span-8 bg-white rounded-3xl p-6 shadow-xl shadow-slate-200/50 flex flex-col h-full border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-poll-h text-violet-500"></i> Generated Results
                </h2>
                <button id="copy-btn" class="hidden text-sm text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-1 bg-slate-100 px-3 py-1.5 rounded-lg">
                    <i class="fa-regular fa-copy"></i> Copy All
                </button>
            </div>
            
            <div id="result-area" class="flex-1 bg-slate-50/50 rounded-2xl border border-slate-200 p-6 overflow-y-auto relative h-full shadow-inner">
                
                <!-- Empty State -->
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-robot text-3xl opacity-60"></i>
                    </div>
                    <p class="text-sm font-medium">Your AI-generated ads will appear here</p>
                    <p class="text-xs mt-1 text-slate-300">Fill the details on the left and hit generate.</p>
                </div>

                <!-- Loading State -->
                <div id="loader" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-50/80 backdrop-blur-sm z-10 rounded-2xl">
                    <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                    <p class="text-indigo-600 font-medium animate-pulse">Crafting perfect ads...</p>
                </div>

                <!-- Output -->
                <div id="ai-output" class="hidden text-slate-700 whitespace-pre-wrap leading-relaxed text-[15px] font-medium selection:bg-indigo-100 selection:text-indigo-900 pb-10"></div>
            </div>
        </div>

    </div>

<script>
    const WORKER_URL = 'https://crimson-firefly-6c68.ashrafhosen839.workers.dev/';

    document.getElementById('generate-btn').addEventListener('click', async () => {
        const product = document.getElementById('product').value.trim();
        const tone = document.getElementById('tone').value;
        const lang = document.querySelector('input[name="lang"]:checked').value;
        
        const btn = document.getElementById('generate-btn');
        const loader = document.getElementById('loader');
        const emptyState = document.getElementById('empty-state');
        const output = document.getElementById('ai-output');
        const copyBtn = document.getElementById('copy-btn');

        if (!product) {
            document.getElementById('product').classList.add('border-red-400', 'ring-1', 'ring-red-400');
            setTimeout(() => document.getElementById('product').classList.remove('border-red-400', 'ring-1', 'ring-red-400'), 2000);
            return;
        }

        // UI State
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Generating...';
        emptyState.classList.add('hidden');
        output.classList.add('hidden');
        copyBtn.classList.add('hidden');
        loader.classList.remove('hidden');

        // Strong prompt for specific language
        const promptText = `Act as an expert digital marketer. Write 3 highly engaging ad copies for a product called "${product}". 
The tone should be ${tone}. 
IMPORTANT: You MUST write the ad copies ONLY in ${lang} language. Do not use any other language for the ad content.
After the ad copies, provide 8 trending and relevant hashtags. Format it cleanly with emojis and separate each ad clearly.`;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: promptText })
            });

            if (!response.ok) throw new Error("Server error");
            const data = await response.json();
            
            const reply = data.response || data.reply || data.message || data.text || data.content || "No response received.";
            
            output.innerHTML = reply;
            output.classList.remove('hidden');
            copyBtn.classList.remove('hidden');

        } catch (error) {
            output.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl flex items-start gap-3"><i class="fa-solid fa-triangle-exclamation mt-1"></i><p>${error.message}</p></div>`;
            output.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<span>Generate Copies</span><i class="fa-solid fa-arrow-right"></i>';
            loader.classList.add('hidden');
        }
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
        const text = document.getElementById('ai-output').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check text-green-500"></i> Copied!';
            setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
        });
    });
</script>
</body>
</html
