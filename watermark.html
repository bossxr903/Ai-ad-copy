<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Watermark Studio | Dark UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #38bdf8; cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px rgba(56,189,248,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px; }
        #canvas-wrapper { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-sky-500/20 p-2 rounded-lg text-sky-400"><i class="fa-solid fa-stamp"></i></div>
            <h1 class="text-xl font-bold text-white tracking-wide">BrandMark <span class="text-sky-400">AI</span></h1>
        </div>
        <button onclick="downloadImage()" class="bg-sky-500 hover:bg-sky-400 text-slate-900 font-semibold py-2 px-5 rounded-lg transition-colors flex items-center gap-2 text-sm">
            <i class="fa-solid fa-download"></i> Export Image
        </button>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Sidebar Controls -->
        <aside class="w-full lg:w-80 border-r border-slate-800 bg-slate-900 p-6 overflow-y-auto shrink-0 space-y-6 shadow-2xl z-0">
            
            <!-- Upload -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">1. Base Image</label>
                <div class="relative group cursor-pointer">
                    <input type="file" id="imageLoader" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <div class="border-2 border-dashed border-slate-700 rounded-xl p-4 text-center group-hover:border-sky-500 group-hover:bg-sky-500/5 transition-all">
                        <i class="fa-regular fa-image text-2xl text-slate-500 group-hover:text-sky-400 mb-2"></i>
                        <p class="text-sm font-medium text-slate-300">Click to upload</p>
                    </div>
                </div>
            </div>

            <hr class="border-slate-800">

            <!-- AI Text Generation -->
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">2. Watermark Text</label>
                <div class="flex gap-2">
                    <input type="text" id="watermarkText" value="Protected Content" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none">
                    <button id="ai-suggest-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-lg shrink-0 transition-colors tooltip relative" title="AI Suggestion">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                </div>
                <p class="text-xs text-slate-500 mt-2"><i class="fa-solid fa-circle-info mr-1"></i> Type a brand theme and click the wand for AI ideas.</p>
            </div>

            <!-- Appearance Settings -->
            <div class="space-y-4">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">3. Appearance</label>
                
                <div class="flex items-center justify-between">
                    <span class="text-sm text-slate-300">Color</span>
                    <input type="color" id="textColor" value="#ffffff" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0 p-0">
                </div>

                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-slate-300">Size</span>
                        <span id="sizeVal" class="text-sky-400 font-mono">40px</span>
                    </div>
                    <input type="range" id="fontSize" min="10" max="150" value="40" class="w-full">
                </div>

                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-slate-300">Opacity</span>
                        <span id="opacityVal" class="text-sky-400 font-mono">50%</span>
                    </div>
                    <input type="range" id="opacity" min="0.1" max="1" step="0.05" value="0.5" class="w-full">
                </div>
            </div>

        </aside>

        <!-- Canvas Area -->
        <section id="canvas-wrapper" class="flex-1 bg-slate-950 p-6 flex items-center justify-center overflow-auto relative">
            <div class="text-center absolute z-0 text-slate-700 select-none pointer-events-none" id="placeholder-text">
                <i class="fa-solid fa-image text-6xl mb-4"></i>
                <h2 class="text-xl font-medium">Upload an image to start</h2>
            </div>
            <canvas id="imageCanvas" class="max-w-full max-h-full rounded-md shadow-2xl relative z-10 border border-slate-800 transition-opacity duration-300 opacity-0"></canvas>
        </section>

    </main>

<script>
    const WORKER_URL = 'https://crimson-firefly-6c68.ashrafhosen839.workers.dev/';
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    let uploadedImage = null;

    const el = {
        loader: document.getElementById('imageLoader'),
        text: document.getElementById('watermarkText'),
        color: document.getElementById('textColor'),
        size: document.getElementById('fontSize'),
        opacity: document.getElementById('opacity'),
        sizeVal: document.getElementById('sizeVal'),
        opVal: document.getElementById('opacityVal')
    };

    el.loader.addEventListener('change', handleImage);
    el.text.addEventListener('input', drawCanvas);
    el.color.addEventListener('input', drawCanvas);
    
    el.size.addEventListener('input', (e) => { el.sizeVal.innerText = e.target.value + 'px'; drawCanvas(); });
    el.opacity.addEventListener('input', (e) => { el.opVal.innerText = Math.round(e.target.value * 100) + '%'; drawCanvas(); });

    // AI Logic
    document.getElementById('ai-suggest-btn').addEventListener('click', async () => {
        const currentText = el.text.value || "Photography";
        const btn = document.getElementById('ai-suggest-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

        const prompt = `Give me exactly ONE short, creative watermark slogan for a brand related to: "${currentText}". Max 3 words. No quotes.`;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: prompt })
            });
            const data = await response.json();
            const reply = data.response || data.reply || data.message || data.text || data.content;
            if(reply) {
                el.text.value = reply.replace(/["']/g, "").trim();
                drawCanvas();
            }
        } catch (e) {
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i>';
        }
    });

    function handleImage(e) {
        if(!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                uploadedImage = img;
                canvas.width = img.width;
                canvas.height = img.height;
                document.getElementById('placeholder-text').style.display = 'none';
                canvas.classList.remove('opacity-0');
                drawCanvas();
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    function drawCanvas() {
        if (!uploadedImage) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0;
        ctx.drawImage(uploadedImage, 0, 0);

        const text = el.text.value;
        const size = el.size.value;
        ctx.font = `bold ${size}px 'Plus Jakarta Sans', sans-serif`;
        ctx.fillStyle = el.color.value;
        ctx.globalAlpha = parseFloat(el.opacity.value);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    }

    function downloadImage() {
        if(!uploadedImage) return alert("Please upload an image first.");
        const link = document.createElement('a');
        link.download = 'brandmark-ai-export.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
