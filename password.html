<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cryptophrase Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #030712; background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #030712 50%); }
        .neon-glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3), inset 0 0 10px rgba(139, 92, 246, 0.1); }
        .pass-font { font-family: 'Courier New', Courier, monospace; letter-spacing: 1px; }
    </style>
</head>
<body class="min-h-screen text-slate-300 flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 neon-glow relative overflow-hidden">
        
        <!-- Decorative bg blur -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-violet-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-2xl bg-violet-500/10 text-violet-400 mb-3">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-1">Neuro<span class="text-violet-400">Pass</span> AI</h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest">Memorable & Secure</p>
        </div>

        <div class="space-y-4">
            <div>
                <input type="text" id="theme" placeholder="Theme (e.g. Matrix, Space, Coffee)" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:border-violet-500 focus:ring-1 focus:ring-violet-500 outline-none text-center transition-all">
            </div>

            <button id="gen-btn" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-violet-900/50 flex justify-center items-center gap-2">
                <i class="fa-solid fa-fingerprint"></i> Generate Keys
            </button>
        </div>

        <div class="mt-8">
            <div class="flex items-center gap-2 mb-3 px-1">
                <div class="h-px bg-slate-800 flex-1"></div>
                <span class="text-xs text-slate-500 font-semibold uppercase">Results</span>
                <div class="h-px bg-slate-800 flex-1"></div>
            </div>

            <div id="result-area" class="bg-slate-950 border border-slate-800 rounded-xl p-5 min-h-[120px] flex flex-col justify-center items-center relative">
                <p id="placeholder" class="text-slate-600 text-sm flex flex-col items-center">
                    <i class="fa-solid fa-lock mb-2 opacity-50"></i> Waiting for generation...
                </p>
                <div id="ai-output" class="hidden w-full space-y-3"></div>
            </div>
        </div>

    </div>

<script>
    const WORKER_URL = 'https://crimson-firefly-6c68.ashrafhosen839.workers.dev/';

    document.getElementById('gen-btn').addEventListener('click', async () => {
        const theme = document.getElementById('theme').value.trim() || "Cyberpunk Technology";
        const btn = document.getElementById('gen-btn');
        const placeholder = document.getElementById('placeholder');
        const outputBox = document.getElementById('ai-output');

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Synthesizing...';
        placeholder.style.display = 'flex';
        placeholder.innerHTML = '<i class="fa-solid fa-microchip fa-spin mb-2 text-violet-500"></i> Running AI Model...';
        outputBox.classList.add('hidden');

        const prompt = `Generate 3 highly secure but memorable passphrases based on the theme: "${theme}". 
        Combine words with numbers and symbols (e.g., BlueMonkeyRides99!). Do not use spaces. 
        Format strictly as JSON array of strings: ["pass1", "pass2", "pass3"]`;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: prompt })
            });

            const data = await response.json();
            const reply = data.response || data.reply || data.message || data.text || data.content;

            // Try to extract JSON array
            const jsonMatch = reply.match(/\[.*\]/s);
            let passwords = [];
            if(jsonMatch) {
                passwords = JSON.parse(jsonMatch[0]);
            } else {
                // Fallback split by lines
                passwords = reply.split('\n').filter(p => p.trim().length > 5).slice(0,3);
            }

            let html = '';
            passwords.forEach(pass => {
                const cleanPass = pass.replace(/["-]/g,'').trim();
                html += `
                    <div class="flex items-center justify-between bg-slate-900 border border-slate-700 p-3 rounded-lg group">
                        <span class="pass-font text-emerald-400 text-sm overflow-hidden text-ellipsis mr-2">${cleanPass}</span>
                        <button onclick="navigator.clipboard.writeText('${cleanPass}')" class="text-slate-500 hover:text-white transition-colors bg-slate-800 p-2 rounded-md">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>`;
            });

            placeholder.style.display = 'none';
            outputBox.innerHTML = html;
            outputBox.classList.remove('hidden');

        } catch (error) {
            placeholder.innerHTML = `<span class="text-red-400">Error: ${error.message}</span>`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-fingerprint"></i> Generate Keys';
        }
    });
</script>
</body>
</html>
